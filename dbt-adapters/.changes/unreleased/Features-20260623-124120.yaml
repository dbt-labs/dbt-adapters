kind: Features
body: 'Add catalog_database support to v2 catalogs.yml: catalog integrations can now specify a physical database override that takes highest priority in generate_database_name over model database config and target.database. default__generate_database_name reads catalog_database from the catalog relation via build_catalog_relation.'
