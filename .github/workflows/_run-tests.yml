# **what?**
# Orchestrates running verify-build, unit-tests, and integration-tests workflows across all packages.

# **why?**
# Provides a single entry point to run all test suites for all packages in the repository.

# **when?**
# This workflow is called by other workflows (like scheduled-tests.yml) or can be manually triggered via workflow_dispatch.

name: "Run Tests"
run-name: "Run Tests - ${{ inputs.branch }}"

on:
    workflow_call:
        inputs:
            branch:
                description: "Branch to test"
                required: true
                type: string
            repository:
                description: "Repository to test"
                required: true
                type: string

permissions:
    id-token: write
    contents: read

jobs:
    verify-builds:
        uses: ./.github/workflows/_verify-build.yml
        strategy:
            fail-fast: false
            matrix:
                package:
                -   "dbt-postgres"
                os: [ubuntu-22.04]
                python-version: ["${{ vars.DEFAULT_PYTHON_VERSION }}"]
        with:
            package: ${{ matrix.package }}
            branch: ${{ inputs.branch }}
            repository: ${{ inputs.repository }}
            os: ${{ matrix.os }}
            python-version: ${{ matrix.python-version }}
        secrets: inherit

    unit-tests:
        uses: ./.github/workflows/_unit-tests.yml
        strategy:
            fail-fast: false
            matrix:
                package:
                -   "dbt-postgres"
                os: [ubuntu-22.04]
                python-version: ["${{ vars.DEFAULT_PYTHON_VERSION }}"]
        with:
            package: ${{ matrix.package }}
            branch: ${{ inputs.branch }}
            repository: ${{ inputs.repository }}
            os: ${{ matrix.os }}
            python-version: ${{ matrix.python-version }}
            hatch-env: "ci"
        secrets: inherit

    integration-tests:
        uses: ./.github/workflows/_integration-tests.yml
        permissions:
            contents: read
            id-token: write
        with:
            packages: ${{ toJSON('[dbt-postgres]') }}
            branch: ${{ inputs.branch }}
            repository: ${{ inputs.repository }}
            os: ${{ vars.DEFAULT_RUNNER }}
            python-version: ${{ vars.DEFAULT_PYTHON_VERSION }}
            hatch-env: "ci"
        secrets: inherit
