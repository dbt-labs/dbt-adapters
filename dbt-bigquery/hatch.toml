[version]
path = "src/dbt/adapters/bigquery/__version__.py"

[build.targets.wheel]
packages = ["src/dbt"]
sources = ["src"]

[envs.default]
pre-install-commands = [
    "pip install -e ../dbt-adapters",
    "pip install -e ../dbt-tests-adapter",
]
dependencies = [
    "dbt-common @ git+https://github.com/dbt-labs/dbt-common.git",
    "dbt-core @ git+https://github.com/dbt-labs/dbt-core.git@1.latest#subdirectory=core",
    "ddtrace==2.3.0",
    "ipdb~=0.13.13",
    "pre-commit==3.7.0",
    "flaky",
    "freezegun",
    "pytest>=7.0,<8.0",
    "pytest-csv~=3.0",
    "pytest-dotenv",
    "pytest-mock",
    "pytest-xdist",
    "requests",
]

[envs.default.scripts]
setup = [
    "pre-commit install",
    "cp -n test.env.example test.env",
]
code-quality = "pre-commit run --all-files"
unit-tests = "python -m pytest {args:tests/unit}"
integration-tests = "python -m pytest --profile service_account {args:tests/functional}"
docker-dev = [
    "docker build -f docker/dev.Dockerfile -t dbt-bigquery-dev .",
	"docker run --rm -it --name dbt-bigquery-dev -v $(shell pwd):/opt/code dbt-bigquery-dev",
]

[envs.build]
detached = true
dependencies = [
    "wheel",
    "twine",
    "check-wheel-contents",
]

[envs.build.scripts]
check-all = [
    "- check-wheel",
    "- check-sdist",
]
check-wheel = [
    "twine check dist/*",
    "find ./dist/dbt_bigquery-*.whl -maxdepth 1 -type f | xargs python -m pip install --force-reinstall --find-links=dist/",
    "pip freeze | grep dbt-bigquery",
]
check-sdist = [
    "check-wheel-contents dist/*.whl --ignore W007,W008",
    "find ./dist/dbt_bigquery-*.gz -maxdepth 1 -type f | xargs python -m pip install --force-reinstall --find-links=dist/",
    "pip freeze | grep dbt-bigquery",
]
docker-prod = "docker build -f docker/Dockerfile -t dbt-bigquery ."

[envs.ci]
pre-install-commands = [
    "pip install -e ../dbt-adapters",
    "pip install -e ../dbt-tests-adapter",
]
dependencies = [
    "dbt-common @ git+https://github.com/dbt-labs/dbt-common.git",
    "dbt-core @ git+https://github.com/dbt-labs/dbt-core.git@1.latest#subdirectory=core",
    "ddtrace==2.3.0",
    "flaky",
    "freezegun",
    "pytest>=7.0,<8.0",
    "pytest-csv~=3.0",
    "pytest-mock",
    "pytest-split",
    "pytest-xdist",
    "requests",
]

[envs.ci.scripts]
unit-tests = "python -m pytest tests/unit --ddtrace"
# -n 8 overrides the `-n auto` in pyproject addopts; BigQuery integration tests are
# I/O-bound (waiting on the BigQuery API) so we oversubscribe past the runner core count.
# {args:} lets the workflow append `--splits N --group M` (pytest-split) for sharding.
integration-tests = 'python -m pytest -m "not flaky" --profile service_account tests/functional --ddtrace -n 8 {args:}'
# keep -n1: flaky python-model tests run serially on purpose; {args:} lets the
# workflow shard them across runners with `--splits N --group M` while staying serial per runner.
integration-tests-flaky = "python -m pytest -n1 -m flaky --profile service_account tests/functional --ddtrace {args:}"

[envs.cd]
pre-install-commands = []
dependencies = [
    "dbt-tests-adapter>=1.11.0,<2.0",
    "ddtrace==2.3.0",
    "flaky",
    "freezegun",
    "pytest>=7.0,<8.0",
    "pytest-csv~=3.0",
    "pytest-mock",
    "pytest-split",
    "pytest-xdist",
    "requests",
]

[envs.cd.scripts]
unit-tests = "python -m pytest tests/unit --ddtrace"
integration-tests = 'python -m pytest -m "not flaky" --profile service_account tests/functional --ddtrace -n 8 {args:}'
# keep -n1: flaky python-model tests run serially on purpose; {args:} lets the
# workflow shard them across runners with `--splits N --group M` while staying serial per runner.
integration-tests-flaky = "python -m pytest -n1 -m flaky --profile service_account tests/functional --ddtrace {args:}"
