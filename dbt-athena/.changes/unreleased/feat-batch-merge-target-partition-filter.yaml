kind: Features
body: "Add automatic target partition filtering in batch_iceberg_merge to reduce Iceberg scan volume during MERGE operations. Disabled when incremental_predicates is set or bucket partitions are present. Note: get_partition_batches now returns a dict with 'src' and 'target' keys instead of a plain list."
