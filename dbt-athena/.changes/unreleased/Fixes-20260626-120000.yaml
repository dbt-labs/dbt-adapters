kind: Fixes
body: Preserve Athena query failure messages from `StateChangeReason` when `AthenaError.ErrorMessage`
  is empty, restoring detection of `TOO_MANY_OPEN_PARTITIONS` and `ICEBERG_COMMIT_ERROR` (fixes the
  partition-batching path for Hive tables with many partitions) and avoiding empty error messages.
